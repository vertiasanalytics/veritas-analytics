kind = "web"
previewPath = "/"
title = "Cálculos Federais"
version = "1.0.0"
id = "artifacts/calc-federal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25594
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/calc-federal run dev"

[services.env]
PORT = "25594"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/calc-federal", "run", "build"]
publicDir = "artifacts/calc-federal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
